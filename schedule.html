<!DOCTYPE html>
<html>
<head>
    <title>Schedule Appointment</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Schedule Appointment</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="schedule.html">Schedule</a>
        <a href="payment.html">Payment</a>
        <a href="surgery.html">Surgery</a>
    </nav>
</header>

<div class="container">
    <div class="content">
        <h2>Book an Appointment</h2>

        <form action="https://formsubmit.co/mandeepshahus@gmail.com" method="POST">
            
            <input type="text" name="name" placeholder="Your Name" required><br><br>
            <input type="email" name="email" placeholder="Your Email" required><br><br>
            <input type="text" name="phone" placeholder="Phone Number" required><br><br>
            
            <input type="text" name="pet" placeholder="Pet Name" required><br><br>
            
            <select name="service" required>
                <option value="">Select Service</option>
                <option>Grooming</option>
                <option>Checkup</option>
                <option>Vaccination</option>
                <option>Surgery Consultation</option>
            </select><br><br>

            <input type="date" name="date" required><br><br>

            <textarea name="message" placeholder="Additional Notes"></textarea><br><br>

            <!-- Hidden Config -->
            <input type="hidden" name="_captcha" value="false">

            <button type="submit">Book Appointment</button>
        </form>
    </div>

    <div class="sidebar">
        <img id="petImage">
        <p id="petFact"></p>
        <button onclick="loadPet()">Refresh</button>
    </div>
</div>

<footer>
    <p>© 2026 HappyPaws</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
